<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="100%" height="500">
  <defs>
    <style>
      .tooth { cursor: pointer; transition: all 0.2s; }
      .tooth:hover ellipse { fill: #e3f2fd; stroke-width: 3; }
      .tooth ellipse { fill: #ffffff; stroke: #1565c0; stroke-width: 2; }
      .tooth text { font-size: 11px; font-weight: bold; fill: #1565c0; pointer-events: none; }
      .tooth.selected ellipse { fill: #1565c0; stroke: #0d47a1; }
      .tooth.selected text { fill: #ffffff; }
      .jaw-label { font-size: 14px; font-weight: bold; fill: #64b5f6; }
      .center-line { stroke: #bbdefb; stroke-width: 2; stroke-dasharray: 8,4; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="600" fill="#f8fbff" rx="15"/>
  
  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">Universal Numbering System (1-32)</text>
  
  <!-- Center divider -->
  <line x1="250" y1="40" x2="250" y2="560" class="center-line"/>
  
  <!-- Upper Jaw Label -->
  <text x="250" y="55" text-anchor="middle" class="jaw-label">UPPER JAW</text>
  
  <!-- ===== UPPER RIGHT (1-8) - Right side of chart ===== -->
  <g class="tooth" id="t1" transform="translate(420, 80)">
    <ellipse cx="0" cy="0" rx="22" ry="26"/>
    <text x="0" y="4" text-anchor="middle">1</text>
  </g>
